<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zwart boekje">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="style.css">
<title>Zwart boekje — NL ↔ FR</title>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Licht/donker">🌙</button>
<div class="wrap">
  <h1>📓 Zwart boekje</h1>

  <!-- Firebase nog niet geconfigureerd -->
  <div id="setup" class="hidden">
    <div class="fcard">
      <div>⚙️ Nog geen database gekoppeld.</div>
      <div class="count">Vul <code>firebase-config.js</code> in — zie stap&nbsp;1 van de README.</div>
    </div>
  </div>

  <!-- login (eenmalig per apparaat) -->
  <div id="login" class="hidden">
    <div class="fcard" style="text-align:left; gap:10px">
      <div>Log één keer in op dit apparaat.</div>
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="username">
      <input id="loginPass" type="password" placeholder="Wachtwoord" autocomplete="current-password">
      <button class="btn" id="loginBtn">Inloggen</button>
      <div class="banner hidden" id="loginError"></div>
    </div>
  </div>

  <!-- hoofdscherm -->
  <div id="main" class="hidden">
    <div class="addcard">
      <input id="nlInput" placeholder="Nederlands…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <input id="frInput" placeholder="Frans…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="btn good" id="addBtn">＋ Voeg toe</button>
      <div class="count hidden" id="addFb"></div>
    </div>

    <div class="row-top">
      <input id="searchInput" placeholder="Zoeken…" autocomplete="off">
      <span class="count" id="wordCount"></span>
    </div>

    <div class="ovcard" id="wordList"></div>
    <div class="empty hidden" id="emptyMsg">Nog geen woorden — voeg het eerste toe!</div>

    <div class="row-top" style="margin-top:20px; justify-content:center">
      <button class="pill danger" id="logoutBtn">Uitloggen</button>
    </div>
  </div>

  <div class="hint" style="margin-top:28px" id="version"></div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
