<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wordlist">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="style.css">
<title>Wordlist — NL ↔ FR</title>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark">🌙</button>
<div class="wrap">
  <h1>📓 Wordlist</h1>

  <!-- login / sign-up (once per device) -->
  <div id="login" class="hidden">
    <div class="fcard" style="text-align:left; gap:10px">
      <div>Log in — or create an account to start your own wordlist.</div>
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="username">
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password">
      <div class="actions" style="justify-content:flex-start">
        <button class="btn good" id="loginBtn">Log in</button>
        <button class="btn" id="signupBtn">Create account</button>
      </div>
      <button class="text-btn" id="resetBtn" style="text-align:left">Forgot password?</button>
      <div class="banner hidden" id="loginError"></div>
      <div class="hint hidden" id="loginInfo" style="text-align:left"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="tabs">
      <button class="pill" id="tabNotebook">📓 Notebook</button>
      <button class="pill" id="tabPractice">🎓 Practice</button>
      <button class="pill" id="tabSpeak">🗣️ Speak</button>
    </div>

    <!-- notebook: add + browse -->
    <div id="notebook" class="hidden">
      <div class="addcard">
        <input id="nlInput" placeholder="Dutch…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <input id="frInput" placeholder="French…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button class="btn good" id="addBtn">＋ Add to my notebook</button>
        <div class="count hidden" id="addFb"></div>
      </div>

      <div class="row-top">
        <select id="filterLesson"></select>
        <button class="pill" id="exportBtn" title="Download as CSV (nl,fr) for learn_words">⬇ CSV</button>
      </div>
      <div class="row-top">
        <input id="searchInput" placeholder="Search…" autocomplete="off">
        <span class="count" id="wordCount"></span>
      </div>

      <div class="ovcard" id="wordList"></div>
      <div class="empty hidden" id="emptyMsg">No words yet — add the first one!</div>
    </div>

    <!-- practice: lesson picker (ported from learn_words) -->
    <div id="pick" class="hidden">
      <div class="row-top tight">
        <select id="lessonSelect"></select>
      </div>
      <div class="count" id="pickCount"></div>
      <div class="bar"><div id="pickBar"></div></div>
      <div class="row-top">
        <button class="pill" id="startNew"></button>
        <button class="pill" id="startAll"></button>
        <button class="pill danger" id="resetLesson" style="margin-left:auto">Reset lesson</button>
      </div>
      <div class="row-top">
        <button class="pill" id="testBtn">Test (25)</button>
        <button class="pill" id="weakBtn">Tricky</button>
        <button class="pill" id="typeToggle" title="Type the answer yourself">⌨️ Type</button>
        <button class="pill" id="dirToggle" title="Switch practice direction"></button>
      </div>
      <div class="count" id="testHint"></div>
      <div class="empty hidden" id="noLessons">No lessons yet — add words in the Notebook tab first.</div>
    </div>

    <!-- flashcard session -->
    <div id="session" class="hidden">
      <div class="row-top">
        <button class="pill" id="stopBtn">← Stop</button>
        <span class="count" id="sessCount" style="margin-left:auto"></span>
      </div>
      <div class="banner hidden" id="retryBanner">Retry round — once more</div>
      <div class="banner hidden" id="testBanner" style="color:var(--accent)">Test — doesn't count towards progress</div>
      <div class="fcard">
        <div class="nl" id="cardNl"></div>
        <div class="fr hidden" id="cardFr"></div>
        <div class="hidden" id="typeFb"></div>
        <div class="actions hidden" id="speakRow">
          <button class="pill" id="speakBtn" title="Pronounce">🔊</button>
        </div>
      </div>
      <div class="actions" id="showActions">
        <button class="btn" id="showBtn">Show</button>
      </div>
      <div class="actions hidden" id="typeActions">
        <input id="typeInput" autocomplete="off" autocapitalize="off" autocorrect="off"
               spellcheck="false">
        <button class="btn" id="checkBtn">Check</button>
      </div>
      <div class="actions hidden" id="judgeActions">
        <button class="btn bad" id="badBtn">✗ Wrong</button>
        <button class="btn good" id="goodBtn">✓ Correct</button>
      </div>
      <div class="actions hidden" id="nextActions">
        <button class="btn good" id="nextBtn">Next →</button>
      </div>
      <p class="hint" id="kbHint"></p>
    </div>

    <!-- speak: shadowing lessons (FR clips + NL translation), from learn_french -->
    <div id="speak" class="hidden">
      <div class="row-top tight">
        <select id="speakLessonSelect"></select>
      </div>
      <div class="row-top">
        <button class="pill" id="speakBlurToggle" title="Blur translations until tapped">Blur</button>
        <button class="pill" id="speakSpeedToggle" title="Playback speed">1×</button>
        <span class="count" id="speakCount" style="margin-left:auto"></span>
      </div>
      <div id="speakList"></div>
      <div class="empty hidden" id="speakEmpty"></div>
    </div>

    <!-- session done -->
    <div id="done" class="hidden">
      <div class="fcard">
        <div class="summary" id="doneSummary"></div>
        <div class="count" id="doneDetail"></div>
      </div>
      <div class="actions">
        <button class="btn" id="againBtn">Again</button>
        <button class="btn" id="backBtn">Back to lessons</button>
      </div>
    </div>

    <div class="row-top" style="margin-top:20px; justify-content:center">
      <button class="pill danger" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="hint" style="margin-top:28px" id="version"></div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
